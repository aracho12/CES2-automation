id: water_tip3p
name: Water (TIP3P)
net_charge: 0.0
charge_scheme: explicit_or_zero
# Source: Jorgensen et al., J. Chem. Phys. 79, 926 (1983)
# Geometry: d(OH)=0.9572 Å, angle(HOH)=104.52°
# Charges:  q(O)=-0.834, q(H)=+0.417
# LJ (O):   ε=0.1521 kcal/mol, σ=3.1507 Å (defined in lammps_input_writer.py)
atoms:
  - element: O
    type_label: Ow
    charge: -0.834
    xyz: [0.000000, 0.000000, 0.000000]
    bjdisp:
      alpha_iso: 4.7595   # isotropic polarizability, a.u.  [Excel row 24: water O]
      C6: 143.305         # dispersion coeff, kcal/mol*Ang^6
      s: 1.40             # O is NOT the H-bond H → s=1.40

  - element: H
    type_label: Hw
    charge: 0.417
    xyz: [0.957200, 0.000000, 0.000000]
    bjdisp:
      alpha_iso: 1.693    # a.u.  [Excel row 23: water H]
      C6: 42.716          # kcal/mol*Ang^6
      s: 0.53             # H of H-bond → s=0.53

  - element: H
    type_label: Hw
    charge: 0.417
    xyz: [-0.239987, 0.927297, 0.000000]
    bjdisp:
      alpha_iso: 1.693
      C6: 42.716
      s: 0.53             # H of H-bond → s=0.53
connectivity:
  bonds:
    - [1, 1, 2]
    - [1, 1, 3]
  angles:
    - [1, 2, 1, 3]
coeffs:
  bond_coeffs:
    1: [450.0, 0.9572]
  angle_coeffs:
    1: [55.0, 104.52]
